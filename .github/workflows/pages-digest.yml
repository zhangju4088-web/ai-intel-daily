name: Publish Daily Digest to GitHub Pages

on:
  schedule:
    # Beijing 08:00 = UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      digest_date:
        description: "Digest date to generate, for example 2026-06-17. Leave empty for today."
        required: false
        type: string
      extract_limit:
        description: "Number of top articles to read with body extraction and DeepSeek."
        required: false
        default: "16"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      DEEPSEEK_MODEL: deepseek-v4-pro
      DEEPSEEK_TIMEOUT_SECONDS: "18"
      EXTRACT_TIMEOUT_SECONDS: "8"
      FETCH_TIMEOUT_SECONDS: "12"
      TITLE_LOCALIZATION_CHUNK_SIZE: "4"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      INTELHUB_PROGRESS: "1"
      DIGEST_DATE: ${{ github.event.inputs.digest_date }}
      EXTRACT_LIMIT_INPUT: ${{ github.event.inputs.extract_limit }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build static digest
        run: |
          set -euo pipefail
          mkdir -p outputs public
          date_args=()
          if [ -n "${DIGEST_DATE:-}" ]; then
            date_args=(--date "${DIGEST_DATE}")
          fi
          extract_limit="${EXTRACT_LIMIT_INPUT:-16}"
          echo "::group::Digest settings"
          echo "digest_date=${DIGEST_DATE:-today}"
          echo "extract_limit=${extract_limit}"
          echo "deepseek=$([ -n "${DEEPSEEK_API_KEY:-}" ] && echo enabled || echo disabled)"
          echo "fetch_timeout=${FETCH_TIMEOUT_SECONDS}s extract_timeout=${EXTRACT_TIMEOUT_SECONDS}s deepseek_timeout=${DEEPSEEK_TIMEOUT_SECONDS}s"
          echo "::endgroup::"
          if [ -n "${DEEPSEEK_API_KEY}" ]; then
            python -u -m intelhub.cli daily \
              "${date_args[@]}" \
              --extract-text \
              --extract-limit "${extract_limit}" \
              --summarize-with deepseek \
              --site-dir public \
              --out-json outputs/daily-digest.json \
              --out-html outputs/daily-digest.html
          else
            python -u -m intelhub.cli daily \
              "${date_args[@]}" \
              --summarize-with local \
              --site-dir public \
              --out-json outputs/daily-digest.json \
              --out-html outputs/daily-digest.html
          fi

      - name: Commit updated archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public
          if git diff --cached --quiet; then
            echo "No public archive changes to commit"
          else
            git commit -m "chore: update daily digest archive [skip ci]"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
