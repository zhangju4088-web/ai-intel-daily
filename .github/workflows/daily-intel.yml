name: Daily AI Intelligence

on:
  schedule:
    # Beijing 08:00 = UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      DEEPSEEK_MODEL: deepseek-v4-pro
      DEEPSEEK_TIMEOUT_SECONDS: "35"
      EXTRACT_TIMEOUT_SECONDS: "15"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build daily digest
        run: |
          mkdir -p outputs
          if [ -n "${DEEPSEEK_API_KEY}" ]; then
            python -m intelhub.cli daily \
              --extract-text \
              --extract-limit 40 \
              --summarize-with deepseek \
              --out-json outputs/daily-digest.json \
              --out-html outputs/daily-digest.html
          else
            python -m intelhub.cli daily \
              --summarize-with local \
              --out-json outputs/daily-digest.json \
              --out-html outputs/daily-digest.html
          fi

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-ai-intelligence
          path: |
            outputs/daily-digest.json
            outputs/daily-digest.html
