# First-pass source pool for the AI intelligence MVP.
# RSS is preferred. Crawl/manual_link entries should fetch only public pages and store summaries, not full articles.

defaults:
  timezone: Asia/Shanghai
  rsshub_base_url: ${RSSHUB_BASE_URL}
  deepseek_model: deepseek-v4-pro
  daily_top_per_category: 15

